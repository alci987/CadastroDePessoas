spring:
  application:
    name: CadastroDePessoas

  datasource:
    url: jdbc:h2:file:../data/CadastroPessoasDb
    driver-class-name: org.h2.Driver
    username: cadastro_bd
    password: cadastro_bd

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console